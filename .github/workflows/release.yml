name: Release

on:
    push:
        branches:
            - "**"
        tags:
            - "v*"
    schedule:
        - cron: "25 2 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.ver.outputs.version }}
            tag: ${{ steps.ver.outputs.tag }}
            release_name: ${{ steps.ver.outputs.release_name }}
            prerelease: ${{ steps.ver.outputs.prerelease }}
            asset_suffix: ${{ steps.ver.outputs.asset_suffix }}
        steps:
            - name: Compute release metadata
              id: ver
              shell: bash
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    tag="${GITHUB_REF_NAME}"
                    version="${GITHUB_REF_NAME#v}"
                    release_name="Release ${GITHUB_REF_NAME}"
                    prerelease=false
                    asset_suffix="${version}"
                  else
                    short="${GITHUB_SHA::7}"
                    tag="nightly"
                    version="nightly-${short}"
                    release_name="Nightly"
                    prerelease=true
                    asset_suffix="nightly"
                  fi

                  echo "version=${version}" >> "$GITHUB_OUTPUT"
                  echo "tag=${tag}" >> "$GITHUB_OUTPUT"
                  echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
                  echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
                  echo "asset_suffix=${asset_suffix}" >> "$GITHUB_OUTPUT"

    build-linux:
        name: Linux (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      runner: ubuntu-latest
                    - arch: arm64
                      runner: ubuntu-24.04-arm
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install dependencies
              run: sudo apt-get update && sudo apt-get install -y build-essential make cmake pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

            - name: Build
              run: make clean && make VERSION=${{ needs.prepare.outputs.version }}

            - name: Show binary version
              run: ./build/bin/ssdv -v

            - name: Pack binary
              shell: bash
              run: |
                  cp build/bin/ssdv ssdv-${{ needs.prepare.outputs.asset_suffix }}-linux-${{ matrix.arch }}
                  cp build/bin/ssdv-gui ssdv-gui-${{ needs.prepare.outputs.asset_suffix }}-linux-${{ matrix.arch }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ssdv-linux-${{ matrix.arch }}
                  path: |
                      ssdv-${{ needs.prepare.outputs.asset_suffix }}-linux-${{ matrix.arch }}
                      ssdv-gui-${{ needs.prepare.outputs.asset_suffix }}-linux-${{ matrix.arch }}
                  if-no-files-found: error

    build-windows:
        name: Windows (amd64)
        runs-on: windows-latest
        needs: prepare
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup MSYS2
              uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: true
                  install: >-
                      make
                      cmake
                      mingw-w64-x86_64-gcc

            - name: Build
              shell: msys2 {0}
              run: make clean && make VERSION=${{ needs.prepare.outputs.version }}

            - name: Show binary version
              shell: msys2 {0}
              run: ./build/bin/ssdv.exe -v

            - name: Pack binary
              shell: bash
              run: |
                  cp build/bin/ssdv.exe ssdv-${{ needs.prepare.outputs.asset_suffix }}-windows-amd64.exe
                  cp build/bin/ssdv-gui.exe ssdv-gui-${{ needs.prepare.outputs.asset_suffix }}-windows-amd64.exe

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ssdv-windows-amd64
                  path: |
                      ssdv-${{ needs.prepare.outputs.asset_suffix }}-windows-amd64.exe
                      ssdv-gui-${{ needs.prepare.outputs.asset_suffix }}-windows-amd64.exe
                  if-no-files-found: error

    publish:
        runs-on: ubuntu-latest
        needs:
            - prepare
            - build-linux
            - build-windows
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist

            - name: Flatten artifacts
              shell: bash
              run: |
                  mkdir -p release
                  find dist -type f -maxdepth 3 -exec cp {} release/ \;
                  ls -l release

            - name: Move nightly tag to current commit
              if: needs.prepare.outputs.prerelease == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const tag = '${{ needs.prepare.outputs.tag }}';
                      const ref = `tags/${tag}`;
                      const sha = context.sha;
                      try {
                        await github.rest.git.updateRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref,
                          sha,
                          force: true
                        });
                      } catch (error) {
                        if (error.status === 404) {
                          await github.rest.git.createRef({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            ref: `refs/${ref}`,
                            sha
                          });
                        } else {
                          throw error;
                        }
                      }

            - name: Create or update release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.prepare.outputs.tag }}
                  name: ${{ needs.prepare.outputs.release_name }}
                  prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
                  generate_release_notes: true
                  make_latest: ${{ needs.prepare.outputs.prerelease == 'true' && 'false' || 'true' }}
                  overwrite_files: true
                  files: release/*
