name: Build

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    build-linux:
        name: Linux (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      runner: ubuntu-20.04
                    - arch: arm64
                      runner: ubuntu-22.04-arm
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Compute version
              shell: bash
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    v="${GITHUB_REF_NAME#v}"
                  else
                    v="nightly-${GITHUB_SHA::7}"
                  fi
                  echo "VERSION=$v" >> "$GITHUB_ENV"
                  echo "Building version: $v"

            - name: Install dependencies
              run: sudo apt-get update && sudo apt-get install -y git build-essential make cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libgtk-3-0 libwebkit2gtk-4.1-0

            - name: Build
              run: make clean && make VERSION=${VERSION}

            - name: Show binary version
              run: ./build/bin/ssdv -v

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ssdv-linux-${{ matrix.arch }}-${{ env.VERSION }}
                  path: |
                      build/bin/ssdv
                      build/bin/ssdv-gui
                  if-no-files-found: error

    build-windows:
        name: Windows (amd64)
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Compute version
              shell: bash
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    v="${GITHUB_REF_NAME#v}"
                  else
                    v="nightly-${GITHUB_SHA::7}"
                  fi
                  echo "VERSION=$v" >> "$GITHUB_ENV"
                  echo "Building version: $v"

            - name: Build
              shell: bash
              run: |
                  cmake -B build -DVERSION="${VERSION}" -DCMAKE_BUILD_TYPE=Release
                  cmake --build build --config Release

            - name: Show binary version
              shell: bash
              run: ./build/bin/ssdv.exe -v

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ssdv-windows-amd64-${{ env.VERSION }}
                  path: |
                      build/bin/ssdv.exe
                      build/bin/ssdv-gui.exe
                  if-no-files-found: error
